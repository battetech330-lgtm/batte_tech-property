<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Admin Login - BATTETECH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: linear-gradient(135deg, #0a2b4e 0%, #1e3a5f 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            overflow-x: hidden;
        }

        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

        /* Animated Background Pattern */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 320"><path fill="rgba(255,255,255,0.03)" d="M0,96L48,112C96,128,192,160,288,160C384,160,480,128,576,122.7C672,117,768,139,864,154.7C960,171,1056,181,1152,165.3C1248,149,1344,107,1392,85.3L1440,64L1440,320L1392,320C1344,320,1248,320,1152,320C1056,320,960,320,864,320C768,320,672,320,576,320C480,320,384,320,288,320C192,320,96,320,48,320L0,320Z"></path></svg>') repeat-x bottom;
            background-size: 1440px 80px;
            opacity: 0.4;
            pointer-events: none;
        }

        /* Floating Buildings Animation */
        .floating-building {
            position: absolute;
            color: rgba(255,255,255,0.03);
            font-size: 8rem;
            bottom: 0;
            animation: float 20s infinite linear;
            pointer-events: none;
        }

        @keyframes float {
            0% {
                transform: translateX(-100px) translateY(0);
                opacity: 0;
            }
            10% {
                opacity: 0.3;
            }
            90% {
                opacity: 0.3;
            }
            100% {
                transform: translateX(calc(100vw + 100px)) translateY(-50px);
                opacity: 0;
            }
        }

        .floating-building:nth-child(1) { bottom: 10%; left: -100px; animation-duration: 25s; font-size: 6rem; }
        .floating-building:nth-child(2) { bottom: 30%; left: -100px; animation-duration: 35s; font-size: 4rem; animation-delay: 5s; }
        .floating-building:nth-child(3) { bottom: 50%; left: -100px; animation-duration: 28s; font-size: 5rem; animation-delay: 12s; }
        .floating-building:nth-child(4) { bottom: 70%; left: -100px; animation-duration: 32s; font-size: 3rem; animation-delay: 20s; }

        .admin-login-card {
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(10px);
            padding: 2.5rem;
            border-radius: 32px;
            width: 420px;
            max-width: 90%;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
            z-index: 2;
            animation: fadeInUp 0.6s ease;
        }

        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .admin-login-card h1 {
            color: #0a2b4e;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }

        .admin-login-card .sub {
            color: #64748b;
            margin-bottom: 1.8rem;
            font-size: 0.85rem;
        }

        .input-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .input-group label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            color: #475569;
            margin-bottom: 0.3rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .input-group label i {
            margin-right: 0.3rem;
        }

        .admin-login-card input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 50px;
            font-size: 1rem;
            transition: all 0.2s ease;
            background: white;
        }

        .admin-login-card input:focus {
            outline: none;
            border-color: #2c7be5;
            box-shadow: 0 0 0 3px rgba(44,123,229,0.1);
        }

        .admin-login-card button {
            width: 100%;
            background: linear-gradient(135deg, #0a2b4e 0%, #1e3a5f 100%);
            color: white;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }

        .admin-login-card button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(10,43,78,0.3);
        }

        .error-msg {
            color: #dc2626;
            margin-top: 12px;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.3rem;
        }

        .back-link {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1.5rem;
            color: #64748b;
            text-decoration: none;
            font-size: 0.85rem;
            transition: all 0.2s ease;
        }

        .back-link:hover {
            color: #0a2b4e;
            transform: translateX(-3px);
        }

        .setup-note {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #e2e8f0;
            font-size: 0.7rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.4rem;
        }

        @media (max-width: 480px) {
            .admin-login-card {
                padding: 1.8rem;
            }
            .admin-login-card h1 {
                font-size: 1.5rem;
            }
        }
    </style>
</head>
<body>
    <!-- Floating Buildings for Visual Effect -->
    <div class="floating-building"><i class="fas fa-building"></i></div>
    <div class="floating-building"><i class="fas fa-building"></i></div>
    <div class="floating-building"><i class="fas fa-building"></i></div>
    <div class="floating-building"><i class="fas fa-building"></i></div>

    <div class="admin-login-card">
        <h1><i class="fas fa-lock"></i> ADMIN PORTAL</h1>
        <div class="sub">BATTETECH Property Consultants</div>
        
        <div class="input-group">
            <label><i class="fas fa-key"></i> ADMIN PASSWORD</label>
            <input type="password" id="adminPassword" placeholder="Enter admin password">
        </div>
        
        <button onclick="doAdminLogin()">
            <i class="fas fa-sign-in-alt"></i> Access Admin Panel
        </button>
        
        <div id="errorMsg" class="error-msg"></div>
        
        <a href="index.html" class="back-link">
            <i class="fas fa-arrow-left"></i> Back to Homepage
        </a>
        
        <div class="setup-note">
            <i class="fas fa-shield-alt"></i> Secure Admin Access Only
        </div>
    </div>

    <script>
        // Check if admin password is already set
        let ADMIN_PASSWORD = localStorage.getItem('battetech_admin_password');
        
        // If no password set, prompt to create one
        if (!ADMIN_PASSWORD) {
            const newPassword = prompt("🔐 FIRST TIME SETUP\n\nCreate your admin password (keep it safe!):");
            if (newPassword && newPassword.length >= 4) {
                localStorage.setItem('battetech_admin_password', newPassword);
                ADMIN_PASSWORD = newPassword;
                alert("✅ Admin password created! Use it to login next time.");
            } else if (newPassword) {
                alert("Password must be at least 4 characters. Refresh to try again.");
            }
        }
        
        function doAdminLogin() {
            const enteredPassword = document.getElementById('adminPassword').value;
            const errorDiv = document.getElementById('errorMsg');
            
            if (!ADMIN_PASSWORD) {
                errorDiv.innerHTML = '<i class="fas fa-exclamation-triangle"></i> No admin password set. Please refresh and create one.';
                return;
            }
            
            if (enteredPassword === ADMIN_PASSWORD) {
                // Store admin session
                localStorage.setItem('battetech_admin_logged_in', 'true');
                localStorage.setItem('battetech_admin_login_time', Date.now());
                window.location.href = 'admin-panel.html';
            } else {
                errorDiv.innerHTML = '<i class="fas fa-times-circle"></i> Incorrect password. Access denied.';
            }
        }
        
        // Check if already logged in (from another tab)
        if (localStorage.getItem('battetech_admin_logged_in') === 'true') {
            const loginTime = parseInt(localStorage.getItem('battetech_admin_login_time') || '0');
            // Session expires after 24 hours
            if (Date.now() - loginTime < 86400000) {
                window.location.href = 'admin-panel.html';
            }
        }
    </script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-data.js"></script>
</body>
</html>
