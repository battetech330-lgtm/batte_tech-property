<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=1.0">
    <title>Property View - BATTETECH</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; min-height: 100vh; padding-bottom: 70px; }
        
        /* SINGLE BACKGROUND IMAGE */
        .property-background { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            z-index: 0; 
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-color: #1a1a2e;
        }
        .overlay-light { 
            position: fixed; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%; 
            background: rgba(0, 0, 0, 0.55); 
            z-index: 1; 
        }
        
        .dashboard-container { position: relative; z-index: 2; max-width: 100%; padding: 0.6rem; }
        
        .back-link { display: inline-flex; align-items: center; gap: 0.3rem; background: rgba(108,117,125,0.9); color: white; text-decoration: none; padding: 8px 14px; border-radius: 40px; margin-bottom: 0.8rem; font-size: 0.75rem; backdrop-filter: blur(4px); }
        
        .property-header-card, .section-card, .stats-grid .stat-card, .fee-summary, .balance-info, .notification-banner, .rooms-grid .room-card {
            background: rgba(255, 255, 255, 0.94);
            backdrop-filter: blur(8px);
            border-radius: 16px;
            padding: 1rem;
            margin-bottom: 0.8rem;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
        }
        
        /* NO IMAGE in property header card - removed */
        .property-header-card {
            padding: 1rem;
        }
        
        header { background: rgba(10, 43, 78, 0.95); backdrop-filter: blur(10px); color: white; padding: 0.7rem; text-align: center; position: sticky; top: 0; z-index: 100; }
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 0.5rem; }
        .logo-icon { font-size: 1.6rem; background: white; color: #0a2b4e; width: 40px; height: 40px; display: flex; align-items: center; justify-content: center; border-radius: 10px; }
        .logo-text h1 { font-size: 1.1rem; letter-spacing: 1px; }
        .logo-text span { font-size: 0.5rem; letter-spacing: 2px; opacity: 0.8; }
        
        .property-title { font-size: 1.3rem; color: #0a2b4e; margin-bottom: 0.3rem; }
        .property-meta { color: #666; margin-bottom: 0.3rem; font-size: 0.75rem; }
        
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 0.5rem; margin: 0.8rem 0; }
        .stat-card { background: rgba(248, 250, 252, 0.95); padding: 0.7rem; border-radius: 12px; text-align: center; }
        .stat-number { font-size: 0.9rem; font-weight: bold; color: #0a2b4e; }
        .stat-label { font-size: 0.55rem; color: #666; }
        
        .rooms-grid { display: flex; flex-direction: column; gap: 0.8rem; }
        .room-card { background: rgba(248, 250, 252, 0.95); border-radius: 14px; padding: 0.8rem; border: 1px solid rgba(226,232,240,0.5); }
        /* ROOM IMAGE - KEPT, this is the image for each room */
        .room-image { width: 100%; height: 120px; object-fit: cover; border-radius: 12px; margin-bottom: 0.5rem; background: #e2e8f0; }
        .room-number { font-size: 1rem; font-weight: bold; color: #0a2b4e; }
        .room-rent { font-size: 0.85rem; color: #10b981; font-weight: bold; margin: 0.3rem 0; }
        .due-date { font-size: 0.7rem; color: #666; margin: 0.2rem 0; }
        .tenant-info { font-size: 0.75rem; color: #555; margin-top: 0.5rem; padding-top: 0.5rem; border-top: 1px solid #ddd; }
        .status-paid { color: #10b981; font-weight: bold; }
        .status-unpaid { color: #dc2626; font-weight: bold; }
        .vacant-badge { background: #f59e0b; color: white; padding: 2px 8px; border-radius: 20px; font-size: 0.6rem; display: inline-block; }
        .fee-summary { background: rgba(238, 243, 252, 0.95); padding: 0.8rem; border-radius: 12px; margin: 0.8rem 0; font-size: 0.7rem; }
        .balance-info { background: rgba(230, 247, 230, 0.95); padding: 0.8rem; border-radius: 12px; margin: 0.8rem 0; font-size: 0.7rem; }
        .notification-banner { background: rgba(255, 243, 205, 0.95); border-left: 4px solid #ffc107; padding: 0.8rem; margin-bottom: 1rem; border-radius: 12px; font-size: 0.7rem; }
        
        .payment-table-container { overflow-x: auto; margin-top: 0.5rem; }
        .payment-table { width: 100%; border-collapse: collapse; font-size: 0.6rem; }
        .payment-table th, .payment-table td { border: 1px solid #ddd; padding: 4px; text-align: center; }
        .payment-table th { background: #0a2b4e; color: white; }
        .status-paid-bg { background: #d1fae5; color: #065f46; }
        .status-partial-bg { background: #fed7aa; color: #92400e; }
        .status-unpaid-bg { background: #fee2e2; color: #991b1b; }
        
        .view-payments-btn { background: #2c7be5; color: white; border: none; padding: 4px 10px; border-radius: 20px; cursor: pointer; font-size: 0.65rem; margin-top: 0.5rem; }
        .statement-item { background: rgba(238, 243, 252, 0.95); padding: 8px; margin: 5px 0; border-radius: 10px; border-left: 3px solid #2c7be5; font-size: 0.7rem; cursor: pointer; }
        
        .chat-messages { background: rgba(248, 250, 252, 0.95); border-radius: 14px; padding: 0.8rem; max-height: 200px; overflow-y: auto; margin-bottom: 0.8rem; }
        .chat-message { margin-bottom: 0.5rem; padding: 0.5rem; border-radius: 12px; max-width: 90%; font-size: 0.75rem; }
        .chat-message.owner { background: #2c7be5; color: white; margin-left: auto; text-align: right; }
        .chat-message.admin { background: #e5e7eb; }
        .chat-message.img { max-width: 100px; border-radius: 6px; margin-top: 4px; }
        .chat-input-area { display: flex; gap: 0.5rem; margin-top: 0.5rem; flex-wrap: wrap; }
        .chat-input-area input { flex: 1; padding: 10px; border-radius: 25px; border: 1px solid #ccc; font-size: 0.8rem; background: rgba(255,255,255,0.9); }
        .file-input-label { background: #6c757d; color: white; padding: 8px 14px; border-radius: 25px; cursor: pointer; font-size: 0.7rem; }
        button { background: rgba(10, 43, 78, 0.9); color: white; border: none; padding: 8px 16px; border-radius: 40px; cursor: pointer; font-weight: bold; font-size: 0.75rem; }
        .logout-btn { background: #dc2626; margin-top: 1rem; width: 100%; }
        
        .main-footer { background: rgba(7, 30, 54, 0.95); backdrop-filter: blur(5px); color: white; padding: 0.8rem; text-align: center; position: fixed; bottom: 0; left: 0; right: 0; z-index: 90; }
        .phones { display: flex; justify-content: center; gap: 0.8rem; margin: 0.2rem 0; flex-wrap: wrap; font-size: 0.65rem; }
        .whatsapp-btn a { background: #25D366; color: white; padding: 4px 10px; border-radius: 40px; text-decoration: none; display: inline-block; font-size: 0.65rem; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; }
        .modal-content { background: white; max-width: 95%; width: 500px; border-radius: 16px; padding: 1rem; max-height: 80%; overflow-y: auto; }
        
        .content-padding { padding-bottom: 80px; }
        
        @media (min-width: 768px) {
            .dashboard-container { max-width: 1200px; margin: 0 auto; padding: 1rem; }
            .stats-grid { grid-template-columns: repeat(4, 1fr); }
            .rooms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); }
            .main-footer { position: relative; margin-top: 1rem; }
            .content-padding { padding-bottom: 0; }
        }
    </style>
</head>
<body>
    <!-- SINGLE BACKGROUND IMAGE -->
    <div class="property-background" id="propertyBackground"></div>
    <div class="overlay-light"></div>

    <header>
        <div class="logo-container">
            <div class="logo-icon">🏢</div>
            <div class="logo-text"><h1>BATTETECH</h1><span>PROPERTY CONSULTANTS</span></div>
        </div>
    </header>

    <div class="dashboard-container content-padding">
        <a href="owner-dashboard.html" class="back-link">← Back to My Properties</a>
        <div id="propertyContent"></div>
    </div>

    <footer class="main-footer">
        <div class="phones"><p><strong>📱 MTN: 0794115704</strong></p><p><strong>📱 AIRTEL: 0756182284</strong></p></div>
        <p><strong>📧 battetech330@gmail.com</strong></p>
        <div class="whatsapp-btn"><a href="https://wa.me/256794115704" target="_blank">💬 WhatsApp</a></div>
    </footer>

    <script>
        let currentPropertyId = null;
        let chatRefreshInterval = null;
        
        function updatePropertyBackground(imageUrl) {
            const bgDiv = document.getElementById('propertyBackground');
            if (bgDiv) {
                if (imageUrl && imageUrl.trim() !== '') {
                    bgDiv.style.backgroundImage = `url('${imageUrl}')`;
                    bgDiv.style.backgroundSize = 'cover';
                    bgDiv.style.backgroundPosition = 'center';
                } else {
                    bgDiv.style.backgroundImage = 'linear-gradient(135deg, #0a2b4e 0%, #1a4a7a 100%)';
                }
            }
        }

        function checkOwnerLogin() {
            const logged = localStorage.getItem('battetech_logged_owner');
            if (!logged) { window.location.href = 'login.html'; return false; }
            return true;
        }

        function logout() {
            clearAutoLogin();
            localStorage.removeItem('battetech_logged_owner');
            window.location.href = 'index.html';
        }

        function viewStatementDetails(statementId) {
            const financials = getFinancials(propertiesDB[currentPropertyId]);
            const statement = financials.statements.find(s => s.id == statementId);
            if (!statement) return;
            let detailsHtml = `<div style="padding:10px;"><h3>Statement - ${statement.month}</h3><hr><p><strong>Generated:</strong> ${new Date(statement.generatedDate).toLocaleString()}</p><p><strong>Total Collected:</strong> UGX ${statement.summary.totalCollected.toLocaleString()}</p><p><strong>Fee:</strong> UGX ${statement.summary.totalFeeDeducted.toLocaleString()}</p><p><strong>To Owner:</strong> UGX ${statement.summary.totalToOwner.toLocaleString()}</p><h4>✅ Paid:</h4><ul>`;
            statement.paidTenants.forEach(t => { detailsHtml += `<li>${t.name} (${t.room}): UGX ${t.amount.toLocaleString()}</li>`; });
            detailsHtml += `</ul><h4>❌ Unpaid:</h4><ul>`;
            statement.unpaidTenants.forEach(t => { detailsHtml += `<li>${t.name} (${t.room}): UGX ${t.balance.toLocaleString()}${t.penalty > 0 ? ` (Penalty: UGX ${t.penalty.toLocaleString()})` : ''}</li>`; });
            detailsHtml += `</ul><button onclick="this.parentElement.remove()">Close</button></div>`;
            const modal = document.createElement('div');
            modal.style.cssText = 'position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:3000; display:flex; align-items:center; justify-content:center;';
            modal.innerHTML = `<div style="background:white; width:90%; max-width:450px; border-radius:16px; padding:1rem; max-height:80%; overflow-y:auto;">${detailsHtml}</div>`;
            document.body.appendChild(modal);
            modal.onclick = function(e) { if (e.target === modal) modal.remove(); };
        }

        function getCurrentMonthOverdue(property) {
            const currentYear = new Date().getFullYear();
            const currentMonth = new Date().getMonth() + 1;
            const monthKey = `${currentYear}-${String(currentMonth).padStart(2, '0')}`;
            let overdue = 0;
            for (let room of property.units) {
                if (!room.vacant && room.payments[monthKey] && room.payments[monthKey].status !== 'paid') {
                    overdue += room.payments[monthKey].balance;
                }
            }
            return overdue;
        }

        async function loadProperty() {
            currentPropertyId = localStorage.getItem('battetech_selected_property');
            if (!currentPropertyId) { window.location.href = 'owner-dashboard.html'; return; }

            if (window.supabaseDataLoaded) await window.supabaseDataLoaded;
            const prop = propertiesDB[currentPropertyId];
            if (!prop) {
                document.getElementById('propertyContent').innerHTML = '<div class="section-card"><p>Property not found.</p><a href="owner-dashboard.html">Back</a></div>';
                return;
            }
            
            // Set background image
            updatePropertyBackground(prop.propertyBackgroundImage || '');
            
            const financials = getFinancials(prop);
            // Add current month overdue
            financials.currentMonthOverdue = getCurrentMonthOverdue(prop);
            
            const feePercentage = prop.managementFee || 5;
            const penaltyPercentage = prop.penaltyFee || 0;
            const updates = getUpdatesForProperty(currentPropertyId);

            const currentMonthRentDue = financials.currentMonthRentDue || 0;
            const currentMonthCollected = financials.currentMonthCollected || 0;
            const currentMonthPending = financials.currentMonthPending || 0;
            const currentMonthOverdue = financials.currentMonthOverdue || 0;

            let remittanceHtml = '';
            if (financials.remittanceHistory && financials.remittanceHistory.length > 0) {
                financials.remittanceHistory.forEach(r => { remittanceHtml += `<div style="background:#e6f7e6; padding:8px; margin:4px 0; border-radius:10px;"><strong>UGX ${r.amount.toLocaleString()}</strong> - ${r.method}<br><small>${new Date(r.date).toLocaleDateString()}</small></div>`; });
            } else { remittanceHtml = '<p>No remittances yet.</p>'; }

            let billsHtml = '';
            if (financials.billsHistory && financials.billsHistory.length > 0) {
                financials.billsHistory.forEach(bill => { billsHtml += `<div style="background:#f8fafc; padding:8px; margin:4px 0; border-radius:10px;"><strong>${bill.billType}</strong>: UGX ${bill.amount.toLocaleString()}<br><small>${bill.description || ''}</small></div>`; });
            } else { billsHtml = '<p>No bills recorded yet.</p>'; }

            let statementsHtml = '';
            if (financials.statements && financials.statements.length > 0) {
                financials.statements.forEach(stmt => { statementsHtml += `<div class="statement-item" onclick="viewStatementDetails('${stmt.id}')"><strong>${stmt.month}</strong><br><small>Generated: ${new Date(stmt.generatedDate).toLocaleDateString()}</small></div>`; });
            } else { statementsHtml = '<p>No statements generated yet.</p>'; }

            let roomsHtml = '<div class="rooms-grid">';
            for (let i = 0; i < prop.units.length; i++) {
                const unit = prop.units[i];
                roomsHtml += `<div class="room-card">
                    ${unit.roomImage ? `<img src="${unit.roomImage}" class="room-image" onerror="this.src='https://placehold.co/400x300?text=No+Image'">` : '<div class="room-image" style="display:flex;align-items:center;justify-content:center;color:#aaa; background:#e2e8f0;">📷 No Image</div>'}
                    <div class="room-number">🏠 ${escapeHtml(unit.roomNumber)}</div>
                    <div class="room-rent">💰 Rent: UGX ${(unit.rentAmount || 0).toLocaleString()}/month</div>
                    <div class="due-date">📅 Due Date: ${unit.paymentDueDate || 1}th of each month</div>`;
                if (unit.vacant) {
                    roomsHtml += `<span class="vacant-badge">🔓 VACANT</span>`;
                } else {
                    let tenantBalance = 0;
                    let tenantPenalty = 0;
                    for (let month in unit.payments) {
                        if (unit.payments[month].balance > 0) tenantBalance += unit.payments[month].balance;
                        tenantPenalty += unit.payments[month].penaltyAmount || 0;
                    }
                    roomsHtml += `<div class="tenant-info">
                        👤 ${escapeHtml(unit.tenant)}<br>
                        📞 ${unit.tenantPhone || 'No phone'}<br>
                        <span class="${unit.paid ? 'status-paid' : 'status-unpaid'}">${unit.paid ? '✅ Current Month PAID' : '❌ Current Month UNPAID'}</span>
                        ${tenantBalance > 0 ? `<br><span style="color:#dc2626;">📋 Balance Owed: UGX ${tenantBalance.toLocaleString()}</span>` : ''}
                        ${tenantPenalty > 0 ? `<br><span style="color:#f59e0b;">⚠️ Penalty Applied: UGX ${tenantPenalty.toLocaleString()}</span>` : ''}
                    </div>`;
                    roomsHtml += `<button class="view-payments-btn" onclick="viewPayments(${i})">📅 View Payment History</button>`;
                }
                roomsHtml += `</div>`;
            }
            roomsHtml += '</div>';

            let updatesHtml = '';
            if (updates.length > 0) {
                updates.slice(0, 10).forEach(up => { updatesHtml += `<div>📢 ${up.message} <small>(${new Date(up.date).toLocaleDateString()})</small></div>`; });
            } else { updatesHtml = '<p>No updates yet.</p>'; }

            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const currentMonthName = monthNames[new Date().getMonth()];
            const currentYear = new Date().getFullYear();

            const html = `
                <div class="property-header-card">
                    <div class="property-title">🏢 ${escapeHtml(prop.name)}</div>
                    <div class="property-meta">📍 ${escapeHtml(prop.location)}</div>
                    <div class="property-meta"><span style="background:#f59e0b; padding:2px 8px; border-radius:20px;">💰 Management Fee: ${feePercentage}%</span> <span style="background:#dc2626; padding:2px 8px; border-radius:20px;">⚠️ Late Penalty: ${penaltyPercentage}%</span></div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-number">UGX ${currentMonthRentDue.toLocaleString()}</div><div class="stat-label">Rent Due (${currentMonthName})</div></div>
                    <div class="stat-card"><div class="stat-number">UGX ${currentMonthCollected.toLocaleString()}</div><div class="stat-label">Collected This Month</div></div>
                    <div class="stat-card"><div class="stat-number" style="color:#dc2626;">UGX ${currentMonthPending.toLocaleString()}</div><div class="stat-label">Pending This Month</div></div>
                    <div class="stat-card"><div class="stat-number" style="color:#f59e0b;">UGX ${currentMonthOverdue.toLocaleString()}</div><div class="stat-label">Overdue This Month</div></div>
                </div>

                <div class="stats-grid">
                    <div class="stat-card"><div class="stat-number">UGX ${(financials.totalCollected || 0).toLocaleString()}</div><div class="stat-label">Total Collected (All Time)</div></div>
                    <div class="stat-card"><div class="stat-number">UGX ${(financials.totalFeeDeducted || 0).toLocaleString()}</div><div class="stat-label">Total Fee</div></div>
                    <div class="stat-card"><div class="stat-number">UGX ${(financials.pendingRemittance || 0).toLocaleString()}</div><div class="stat-label">Pending to You</div></div>
                    <div class="stat-card"><div class="stat-number">UGX ${(financials.alreadyRemitted || 0).toLocaleString()}</div><div class="stat-label">Already Sent</div></div>
                </div>

                <div class="fee-summary">
                    <strong>💰 Financial Summary (${currentMonthName} ${currentYear})</strong><br>
                    Total Rent Due This Month: UGX ${currentMonthRentDue.toLocaleString()}<br>
                    Collected This Month: UGX ${currentMonthCollected.toLocaleString()}<br>
                    <span style="color:#dc2626;">Pending This Month: UGX ${currentMonthPending.toLocaleString()}</span><br>
                    <span style="color:#f59e0b;">Overdue This Month: UGX ${currentMonthOverdue.toLocaleString()}</span><br>
                    <hr style="margin:0.3rem 0;">
                    Management Fee (${feePercentage}%): <span style="color:#dc2626;">- UGX ${(financials.totalFeeDeducted || 0).toLocaleString()}</span><br>
                    <strong>💰 Pending to Be Sent to You: UGX ${(financials.pendingRemittance || 0).toLocaleString()}</strong><br>
                    <strong>✅ Already Sent to You: UGX ${(financials.alreadyRemitted || 0).toLocaleString()}</strong>
                </div>

                <div class="balance-info"><strong>📋 Remittance History</strong>${remittanceHtml}</div>
                <div class="balance-info"><strong>🧾 Bills Paid (Deducted from Your Rent)</strong>${billsHtml}</div>
                <div class="balance-info"><strong>📄 Monthly Statements</strong>${statementsHtml}</div>
                <div class="notification-banner"><strong>🔔 Recent Updates</strong>${updatesHtml}</div>

                <div class="section-card"><div class="section-title">🏠 Rooms & Tenants</div>${roomsHtml}</div>

                <div class="section-card">
                    <div class="section-title">💬 Message BattleTech Admin</div>
                    <div id="chatMessages" class="chat-messages"></div>
                    <div class="chat-input-area">
                        <input type="text" id="ownerMsgInput" placeholder="Type your message...">
                        <button onclick="sendOwnerMessage()">Send</button>
                        <input type="file" id="ownerImageInput" accept="image/*" style="display:none;" onchange="sendOwnerImage()">
                        <label class="file-input-label" onclick="document.getElementById('ownerImageInput').click()">📷 Attach</label>
                    </div>
                </div>

                <button onclick="logout()" class="logout-btn">🚪 Logout</button>
            `;

            document.getElementById('propertyContent').innerHTML = html;
            loadChat();
            if (chatRefreshInterval) clearInterval(chatRefreshInterval);
            chatRefreshInterval = setInterval(loadChat, 5000);
        }

        function viewPayments(roomIndex) {
            const prop = propertiesDB[currentPropertyId];
            const room = prop.units[roomIndex];
            let paymentTable = `<div class="payment-table-container"><table class="payment-table"><thead><tr><th>Month</th><th>Rent Due</th><th>Amount Paid</th><th>Balance</th><th>Fee Deducted</th><th>Amount to You</th><th>Penalty</th><th>Status</th></tr></thead><tbody>`;
            const months = Object.keys(room.payments).sort();
            for (let month of months) {
                const p = room.payments[month];
                let statusClass = '';
                if (p.status === 'paid') statusClass = 'status-paid-bg';
                else if (p.status === 'partial') statusClass = 'status-partial-bg';
                else statusClass = 'status-unpaid-bg';
                paymentTable += `<tr class="${statusClass}"><td>${month}</td><td>UGX ${p.rentDue.toLocaleString()}</td><td>UGX ${p.paid.toLocaleString()}</td><td>UGX ${p.balance.toLocaleString()}</td><td>UGX ${p.feeDeducted.toLocaleString()}</td><td>UGX ${p.amountToOwner.toLocaleString()}</td><td>UGX ${(p.penaltyAmount || 0).toLocaleString()}</td><td>${p.status.toUpperCase()}</td></tr>`;
            }
            paymentTable += `</tbody></table></div>`;
            const modalHtml = `<div id="yearlyModal" style="position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:2000; display:flex; align-items:center; justify-content:center;"><div style="background:white; width:95%; max-width:500px; border-radius:16px; padding:1rem; max-height:80%; overflow-y:auto;"><h3 style="margin-bottom:1rem;">📅 Payment History - ${room.roomNumber}</h3>${paymentTable}<p style="margin-top:0.5rem; font-size:0.65rem; color:#666;">💡 Fee deducted from each payment | Penalty added for late payments</p><button onclick="document.getElementById('yearlyModal').remove()" style="margin-top:1rem;">Close</button></div></div>`;
            document.body.insertAdjacentHTML('beforeend', modalHtml);
        }

        function loadChat() {
            const chatContainer = document.getElementById('chatMessages');
            if (!chatContainer) return;
            const messages = getMessages(currentPropertyId);
            if (messages.length === 0) { chatContainer.innerHTML = '<p style="text-align:center;">No messages yet.</p>'; return; }
            let html = '';
            messages.slice(-20).forEach(msg => {
                const isOwner = msg.sender === 'owner';
                html += `<div class="chat-message ${isOwner ? 'owner' : 'admin'}">
                            <small>${isOwner ? 'You' : 'BattleTech Admin'} • ${new Date(msg.timestamp).toLocaleString()}</small>
                            <div>${msg.message}</div>
                            ${msg.image ? `<img src="${msg.image}">` : ''}
                         </div>`;
            });
            chatContainer.innerHTML = html;
            chatContainer.scrollTop = chatContainer.scrollHeight;
        }

        function sendOwnerMessage() {
            const input = document.getElementById('ownerMsgInput');
            const message = input.value.trim();
            if (!message) return;
            sendMessage(currentPropertyId, 'owner', message, null);
            input.value = '';
            loadChat();
        }

        function sendOwnerImage() {
            const fileInput = document.getElementById('ownerImageInput');
            const file = fileInput.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                sendMessage(currentPropertyId, 'owner', '(Image attached)', e.target.result);
                loadChat();
            };
            reader.readAsDataURL(file);
            fileInput.value = '';
        }

        function escapeHtml(text) {
            if (!text) return '';
            return text.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        window.addEventListener('load', async () => {
            await window.supabaseDataLoaded;
            if (checkOwnerLogin()) { await loadProperty(); }
        });
    </script>
