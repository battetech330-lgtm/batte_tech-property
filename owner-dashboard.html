<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes">
    <title>My Properties - BATTETECH</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { 
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            background: linear-gradient(135deg, #f5f7fa 0%, #e4e8f0 100%);
            min-height: 100vh;
            padding-bottom: 70px;
        }
        
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');
        
        header { 
            background: linear-gradient(135deg, #0a2b4e 0%, #1e3a5f 100%);
            color: white; 
            padding: 1rem; 
            text-align: center; 
            position: sticky; 
            top: 0; 
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.1);
        }
        
        .logo-container { display: flex; align-items: center; justify-content: center; gap: 0.8rem; }
        .logo-icon { 
            font-size: 1.8rem; 
            background: linear-gradient(135deg, #fff 0%, #e2e8f0 100%);
            color: #0a2b4e; 
            width: 50px; 
            height: 50px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            border-radius: 16px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        .logo-text h1 { 
            font-size: 1.5rem; 
            letter-spacing: 1px;
            font-weight: 700;
            background: linear-gradient(135deg, #fff 0%, #bbd4ff 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .logo-text span { 
            font-size: 0.6rem; 
            letter-spacing: 3px; 
            opacity: 0.8;
            display: block;
        }
        
        .dashboard-container { max-width: 1400px; margin: 2rem auto; padding: 0 1.5rem; }
        
        .owner-header { 
            background: white; 
            padding: 1.5rem 2rem; 
            border-radius: 24px; 
            margin-bottom: 2rem; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            flex-wrap: wrap; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
        }
        
        .welcome-text { 
            font-size: 1.3rem; 
            color: #1e293b;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .welcome-text strong { 
            color: #2c7be5; 
            font-size: 1.4rem;
            font-weight: 700;
        }
        
        .logout-btn { 
            background: linear-gradient(135deg, #dc2626 0%, #b91c1c 100%);
            color: white; 
            border: none; 
            padding: 10px 24px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.85rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(220,38,38,0.3);
        }
        .logout-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(220,38,38,0.4);
        }
        
        .whatsapp-contact { 
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white; 
            border: none; 
            padding: 10px 24px; 
            border-radius: 50px; 
            cursor: pointer; 
            font-weight: 600; 
            font-size: 0.85rem; 
            margin-right: 12px; 
            text-decoration: none; 
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
            box-shadow: 0 2px 8px rgba(37,211,102,0.3);
        }
        .whatsapp-contact:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(37,211,102,0.4);
        }
        
        .section-card { 
            background: white; 
            border-radius: 28px; 
            padding: 1.8rem; 
            margin-bottom: 2rem; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.03);
        }
        
        .section-title { 
            font-size: 1.3rem; 
            color: #0a2b4e; 
            margin-bottom: 1.5rem; 
            border-left: 5px solid #2c7be5; 
            padding-left: 1rem; 
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .properties-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
            gap: 1.5rem;
        }
        
        .property-card { 
            background: linear-gradient(135deg, #ffffff 0%, #f8fafc 100%);
            border-radius: 20px; 
            padding: 1.2rem; 
            border-left: 5px solid #2c7be5; 
            cursor: pointer; 
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        .property-card:hover { 
            transform: translateY(-5px) scale(1.01);
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }
        
        .property-name { 
            font-size: 1.2rem; 
            font-weight: 700; 
            color: #0a2b4e;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        
        .property-location { 
            color: #64748b; 
            font-size: 0.85rem; 
            margin: 0.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .property-stats { 
            display: flex; 
            gap: 0.8rem; 
            margin: 1rem 0; 
            flex-wrap: wrap; 
        }
        .property-stats span { 
            background: #eef2ff; 
            padding: 6px 14px; 
            border-radius: 30px; 
            font-size: 0.7rem;
            font-weight: 500;
            color: #1e40af;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
        }
        
        .property-image-preview { 
            width: 100%; 
            height: 140px; 
            object-fit: cover; 
            border-radius: 16px; 
            margin-top: 0.8rem;
        }
        
        .status-badge { 
            display: inline-block; 
            padding: 5px 14px; 
            border-radius: 30px; 
            font-size: 0.7rem; 
            font-weight: 600; 
        }
        .status-active { 
            background: linear-gradient(135deg, #10b981 0%, #059669 100%);
            color: white; 
        }
        .status-pending { 
            background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            color: white; 
        }
        
        .view-details-btn {
            background: linear-gradient(135deg, #2c7be5 0%, #1a68d1 100%);
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.7rem;
            font-weight: 600;
            margin-top: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            transition: all 0.3s ease;
        }
        .view-details-btn:hover {
            transform: scale(1.02);
            box-shadow: 0 3px 10px rgba(44,123,229,0.3);
        }
        
        .empty-state { 
            text-align: center; 
            padding: 4rem; 
            background: white; 
            border-radius: 28px; 
            color: #64748b;
            font-size: 1rem;
        }
        
        .main-footer { 
            background: linear-gradient(135deg, #0a2b4e 0%, #071e36 100%);
            color: white; 
            margin-top: 3rem; 
            padding: 2rem; 
            text-align: center; 
        }
        .phones { display: flex; justify-content: center; gap: 2rem; margin: 0.8rem 0; flex-wrap: wrap; font-size: 0.85rem; }
        .whatsapp-btn a { 
            background: linear-gradient(135deg, #25D366 0%, #128C7E 100%);
            color: white; 
            padding: 8px 20px; 
            border-radius: 50px; 
            text-decoration: none; 
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            font-weight: 500;
            transition: all 0.3s ease;
        }
        .whatsapp-btn a:hover {
            transform: scale(1.05);
        }
        
        @media (max-width: 768px) {
            .dashboard-container { padding: 0 1rem; margin: 1rem auto; }
            .owner-header { flex-direction: column; text-align: center; gap: 1rem; }
            .properties-grid { grid-template-columns: 1fr; }
            .section-title { font-size: 1.1rem; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <div class="logo-icon"><i class="fas fa-building"></i></div>
        <div class="logo-text">
            <h1>BATTETECH</h1>
            <span>PROPERTY CONSULTANTS</span>
        </div>
    </div>
</header>

<div class="dashboard-container">
    <div class="owner-header">
        <div class="welcome-text">
            <i class="fas fa-hand-peace"></i> Welcome, <strong id="ownerName"></strong>
        </div>
        <div>
            <a href="https://wa.me/256756182282" target="_blank" class="whatsapp-contact">
                <i class="fab fa-whatsapp"></i> Chat with Admin
            </a>
            <button onclick="logout()" class="logout-btn">
                <i class="fas fa-arrow-right-from-bracket"></i> Logout
            </button>
        </div>
    </div>

    <!-- ONLY MY PROPERTIES SECTION -->
    <div class="section-card">
        <div class="section-title">
            <i class="fas fa-building"></i> MY PROPERTIES
        </div>
        <div id="propertiesGrid" class="properties-grid"></div>
    </div>
</div>

<footer class="main-footer">
    <div class="contact-info">
        <h3>YOUR PROPERTY, OUR PRIORITY</h3>
        <div class="phones">
            <p><i class="fas fa-phone-alt"></i> <strong>MTN: 0794115704</strong></p>
            <p><i class="fas fa-phone-alt"></i> <strong>AIRTEL: 0756182284</strong></p>
        </div>
        <p><i class="fas fa-envelope"></i> <strong>battetech330@gmail.com</strong></p>
        <div class="whatsapp-btn">
            <a href="https://wa.me/256794115704" target="_blank"><i class="fab fa-whatsapp"></i> Chat on WhatsApp</a>
        </div>
    </div>
    <div class="copyright" style="margin-top: 1rem;">
        <p>&copy; 2026 BATTETECH PROPERTY CONSULTANTS - Kampala, Uganda</p>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-config.js"></script>
<script src="supabase-data.js"></script>
<script src="activity-log.js"></script>

<script>
    let ownerData = null;
    let currentPropertyId = null;
    
    function checkOwnerLogin() {
        const logged = localStorage.getItem('battetech_logged_owner');
        const sessionTime = parseInt(localStorage.getItem('battetech_owner_session_time') || '0');
        
        if (!logged) {
            window.location.href = 'login.html';
            return false;
        }
        
        if (Date.now() - sessionTime > 28800000) {
            localStorage.removeItem('battetech_logged_owner');
            localStorage.removeItem('battetech_owner_session_time');
            localStorage.removeItem('battetech_owner_property_id');
            alert('Session expired. Please login again.');
            window.location.href = 'login.html';
            return false;
        }
        
        localStorage.setItem('battetech_owner_session_time', Date.now());
        
        ownerData = JSON.parse(logged);
        document.getElementById('ownerName').innerText = ownerData.name || 'Owner';
        return true;
    }
    
    function logout() {
        localStorage.removeItem('battetech_logged_owner');
        localStorage.removeItem('battetech_owner_session_time');
        localStorage.removeItem('battetech_owner_property_id');
        window.location.href = 'index.html';
    }
    
    async function loadProperties() {
        const container = document.getElementById('propertiesGrid');
        if (!container) return;
        
        const owner = JSON.parse(localStorage.getItem('battetech_logged_owner'));
        const propertyIdFromStorage = localStorage.getItem('battetech_owner_property_id');
        
        let targetPropertyId = null;
        
        if (owner && owner.propertyId) {
            targetPropertyId = owner.propertyId;
        } else if (propertyIdFromStorage) {
            targetPropertyId = propertyIdFromStorage;
        }
        
        if (!targetPropertyId) {
            container.innerHTML = '<div class="empty-state"><i class="fas fa-building"></i> No property assigned to you. Please contact BattleTech.</div>';
            return;
        }
        
        currentPropertyId = targetPropertyId;
        localStorage.setItem('battetech_owner_property_id', targetPropertyId);
        
        const { data: property, error } = await window.supabaseClient
            .from('properties')
            .select('*')
            .eq('id', targetPropertyId)
            .single();
        
        if (error || !property) {
            console.error('Error loading property:', error);
            container.innerHTML = '<div class="empty-state"><i class="fas fa-exclamation-triangle"></i> Error loading property. Please contact BattleTech.</div>';
            return;
        }
        
        const propertyData = property.data || { units: [] };
        const units = propertyData.units || [];
        const occupied = units.filter(u => !u.vacant).length;
        const vacant = units.filter(u => u.vacant).length;
        const totalRooms = units.length;
        
        const statusBadge = property.status === 'pending' ? 
            '<span class="status-badge status-pending"><i class="fas fa-clock"></i> Pending</span>' : 
            '<span class="status-badge status-active"><i class="fas fa-check-circle"></i> Active</span>';
        
        let html = `
            <div class="property-card" onclick="viewPropertyDetails('${property.id}')" style="cursor:pointer;">
                <div style="display: flex; justify-content: space-between; align-items: start;">
                    <div class="property-name">
                        <i class="fas fa-building"></i> ${escapeHtml(property.name)}
                    </div>
                    ${statusBadge}
                </div>
                <div class="property-location">
                    <i class="fas fa-location-dot"></i> ${escapeHtml(property.location)}
                </div>
                ${property.property_image ? `<img src="${property.property_image}" class="property-image-preview" onerror="this.style.display='none'">` : ''}
                <div class="property-stats">
                    <span><i class="fas fa-users"></i> ${occupied} occupied</span>
                    <span><i class="fas fa-door-open"></i> ${vacant} vacant</span>
                    <span><i class="fas fa-coins"></i> ${totalRooms} total</span>
                    <span><i class="fas fa-percent"></i> Fee: ${property.management_fee || 5}%</span>
                </div>
                <button class="view-details-btn" onclick="event.stopPropagation(); viewPropertyDetails('${property.id}')">
                    <i class="fas fa-eye"></i> View Full Details
                </button>
            </div>
        `;
        
        container.innerHTML = html;
    }
    
    function viewPropertyDetails(propertyId) {
        console.log('Viewing property details:', propertyId);
        localStorage.setItem('battetech_selected_property', propertyId);
        window.location.href = 'owner-property-view.html';
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    window.addEventListener('load', async () => {
        await window.supabaseDataLoaded;
        if (checkOwnerLogin()) {
            await loadProperties();
        }
    });
</script>
</body>
</html>
