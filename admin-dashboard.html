<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=yes, maximum-scale=1.0">
    <title>Admin Dashboard - BATTETECH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #f0f4fa;
            min-height: 100vh;
            padding-bottom: 70px;
        }

        /* Mobile-first header */
        header {
            background: #0a2b4e;
            color: white;
            padding: 0.8rem 1rem;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
        }

        .logo-icon {
            font-size: 1.6rem;
            background: white;
            color: #0a2b4e;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 10px;
        }

        .logo-text h1 {
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .logo-text span {
            font-size: 0.55rem;
            letter-spacing: 2px;
            opacity: 0.8;
        }

        /* Dashboard Container - Mobile padding */
        .dashboard-container {
            max-width: 100%;
            margin: 0;
            padding: 0.8rem;
        }

        /* Admin Header - Stack on mobile */
        .admin-header-bar {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1rem;
            background: white;
            padding: 1rem;
            border-radius: 16px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }

        .admin-header-bar h2 {
            color: #0a2b4e;
            font-size: 1.2rem;
            text-align: center;
        }

        .session-info {
            display: flex;
            justify-content: center;
            gap: 0.8rem;
            align-items: center;
            flex-wrap: wrap;
        }

        .session-timer {
            background: #f59e0b;
            color: #1a2a3e;
            padding: 6px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 6px 16px;
            border-radius: 40px;
            cursor: pointer;
            font-weight: bold;
            font-size: 0.75rem;
        }

        /* Action Buttons - Full width on mobile */
        .action-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 1.2rem;
        }

        .add-property-btn, .delete-all-btn {
            width: 100%;
            padding: 14px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
        }

        .add-property-btn {
            background: #10b981;
            color: white;
        }

        .delete-all-btn {
            background: #dc2626;
            color: white;
        }

        /* Section Title */
        .section-title {
            font-size: 1.1rem;
            color: #0a2b4e;
            margin: 0.8rem 0;
            padding-left: 0.5rem;
            border-left: 4px solid #2c7be5;
        }

        /* Properties Grid - Single column on mobile */
        .properties-grid {
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }

        .property-card {
            background: white;
            border-radius: 16px;
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 2px 6px rgba(0,0,0,0.08);
            border-left: 4px solid #2c7be5;
        }

        .property-card:active {
            transform: scale(0.98);
            background: #f8fafc;
        }

        .property-card.pending {
            border-left-color: #f59e0b;
            background: #fffbeb;
        }

        .property-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }

        .property-name {
            font-size: 1.1rem;
            font-weight: bold;
            color: #0a2b4e;
        }

        .status-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 0.6rem;
            font-weight: bold;
        }

        .status-active {
            background: #10b981;
            color: white;
        }

        .status-pending {
            background: #f59e0b;
            color: white;
        }

        .property-location {
            color: #666;
            font-size: 0.75rem;
            margin-bottom: 0.5rem;
        }

        .property-image-preview {
            width: 100%;
            height: 100px;
            object-fit: cover;
            border-radius: 12px;
            margin: 0.5rem 0;
        }

        .property-stats {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin: 0.5rem 0;
        }

        .property-stats span {
            background: #eef3fc;
            padding: 4px 10px;
            border-radius: 20px;
            font-size: 0.65rem;
        }

        .owner-info {
            font-size: 0.7rem;
            color: #555;
            margin-top: 0.5rem;
            padding-top: 0.5rem;
            border-top: 1px solid #eee;
        }

        .empty-state {
            text-align: center;
            padding: 2rem;
            background: white;
            border-radius: 16px;
            color: #666;
            font-size: 0.9rem;
        }

        /* Modal - Full screen on mobile */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-content {
            background: white;
            width: 95%;
            max-width: 500px;
            border-radius: 20px;
            padding: 1.2rem;
            max-height: 90%;
            overflow-y: auto;
        }

        .modal-content h2 {
            color: #0a2b4e;
            margin-bottom: 1rem;
            font-size: 1.2rem;
        }

        .form-row {
            margin-bottom: 0.8rem;
        }

        .form-row input, .form-row select {
            width: 100%;
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #ddd;
            font-size: 0.9rem;
        }

        .form-row-2 {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .form-row-3 {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-bottom: 0.8rem;
        }

        .image-preview {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 12px;
            margin-top: 0.5rem;
        }

        .upload-btn {
            background: #f59e0b;
            margin-left: 0.5rem;
            padding: 10px 14px;
            font-size: 0.8rem;
        }

        .modal-buttons {
            display: flex;
            flex-direction: column;
            gap: 0.8rem;
            margin-top: 1.2rem;
        }

        .modal-buttons button {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            font-size: 1rem;
        }

        .btn-cancel {
            background: #6c757d;
        }

        /* Footer - Mobile optimized */
        .main-footer {
            background: #071e36;
            color: white;
            margin-top: 1.5rem;
            padding: 1rem;
            text-align: center;
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            z-index: 90;
        }

        .phones {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin: 0.3rem 0;
            flex-wrap: wrap;
            font-size: 0.7rem;
        }

        .whatsapp-btn a {
            background: #25D366;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            text-decoration: none;
            display: inline-block;
            font-size: 0.7rem;
        }

        /* Add padding for fixed footer */
        .content-padding {
            padding-bottom: 80px;
        }

        @media (min-width: 768px) {
            .dashboard-container {
                max-width: 1200px;
                margin: 0 auto;
                padding: 1rem;
            }
            
            .admin-header-bar {
                flex-direction: row;
                justify-content: space-between;
                align-items: center;
            }
            
            .action-buttons {
                flex-direction: row;
            }
            
            .add-property-btn, .delete-all-btn {
                width: auto;
            }
            
            .properties-grid {
                display: grid;
                grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            }
            
            .form-row-2 {
                flex-direction: row;
            }
            
            .form-row-3 {
                flex-direction: row;
            }
            
            .modal-buttons {
                flex-direction: row;
            }
            
            .main-footer {
                position: relative;
                margin-top: 2rem;
            }
            
            .content-padding {
                padding-bottom: 0;
            }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <div class="logo-icon">🏢</div>
        <div class="logo-text">
            <h1>BATTETECH</h1>
            <span>ADMIN DASHBOARD</span>
        </div>
    </div>
</header>

<div class="dashboard-container content-padding">
    <div class="admin-header-bar">
        <h2>🔧 Welcome, Admin</h2>
        <div class="session-info">
            <span class="session-timer" id="sessionTimer">Session: 5:00</span>
            <button onclick="adminLogout()" class="logout-btn">🚪 Logout</button>
        </div>
    </div>

    <div class="action-buttons">
        <button class="add-property-btn" onclick="openAddPropertyModal()">➕ Add New Property</button>
    </div>

    <div class="section-title">📋 My Properties</div>
    <div id="propertiesGrid" class="properties-grid"></div>
</div>

<!-- Add Property Modal -->
<div id="addPropertyModal" class="modal">
    <div class="modal-content">
        <h2>➕ Add New Property</h2>
        
        <div class="form-row">
            <input type="text" id="propName" placeholder="Property Name">
        </div>
        
        <div class="form-row">
            <input type="text" id="propLocation" placeholder="Location">
        </div>
        
        <div class="form-row-2">
            <input type="text" id="propOwnerPassword" placeholder="Owner Password">
            <input type="text" id="propOwnerName" placeholder="Owner Name">
        </div>
        
        <div class="form-row-2">
            <input type="text" id="propOwnerPhone" placeholder="Owner Phone">
            <div style="display: flex; gap: 0.5rem;">
                <input type="text" id="propImage" placeholder="Image URL" style="flex:1;">
                <button type="button" class="upload-btn" onclick="uploadPropertyImage()">📷</button>
            </div>
        </div>
        <div id="propertyImagePreview"></div>
        
        <div class="form-row-2">
            <input type="number" id="propManagementFee" placeholder="Fee (%)" value="5" step="0.5">
            <input type="number" id="propPenaltyFee" placeholder="Penalty (%)" value="0" step="0.5">
        </div>
        
        <div class="form-row-3">
            <input type="number" id="propElectricity" placeholder="Electricity">
            <input type="number" id="propWater" placeholder="Water">
            <input type="number" id="propGarbage" placeholder="Garbage">
        </div>
        
        <div class="form-row">
            <select id="propStatus">
                <option value="active">Active (Show on Rentals)</option>
                <option value="pending">Pending (Hidden)</option>
            </select>
        </div>
        
        <div class="modal-buttons">
            <button onclick="addNewPropertyFromModal()" style="background:#10b981;">✅ Add Property</button>
            <button onclick="closeAddPropertyModal()" class="btn-cancel">Cancel</button>
        </div>
    </div>
</div>

<!-- Delete Confirmation Modal -->
<div id="deleteConfirmModal" class="modal">
    <div class="modal-content">
        <h2>⚠️ Confirm Property Deletion</h2>
        <p style="margin-bottom: 1rem;">A verification code has been sent to the admin's WhatsApp.</p>
        <div class="form-row">
            <input type="text" id="verificationCode" placeholder="Enter 6-digit code" maxlength="6">
        </div>
        <p id="deletePropertyName" style="font-size:0.8rem; color:#666; margin-bottom:1rem;"></p>
        <div style="display:flex; gap:0.8rem; margin-top:1rem;">
            <button onclick="verifyAndDelete()" style="background:#dc2626;">Confirm Delete</button>
            <button onclick="closeDeleteModal()">Cancel</button>
        </div>
    </div>
</div>

<footer class="main-footer">
    <div class="contact-info">
        <h3>YOUR PROPERTY, OUR PRIORITY</h3>
        <div class="phones">
            <p><strong>📱 MTN: 0794115704</strong></p>
            <p><strong>📱 AIRTEL: 0756182284</strong></p>
        </div>
        <p><strong>📧 battetech330@gmail.com</strong></p>
            <div class="whatsapp-btn">
            <a href="https://wa.me/256756182282" target="_blank">💬 WhatsApp</a>
        </div>
    </div>
</footer>

<script>
    // ============ SESSION MANAGEMENT ============
    
    function checkAdminSession() {
        const isLoggedIn = localStorage.getItem('battetech_admin_session');
        const sessionTime = parseInt(localStorage.getItem('battetech_admin_session_time') || '0');
        
        if (isLoggedIn !== 'true') {
            window.location.href = 'login.html';
            return false;
        }
        
        if (Date.now() - sessionTime > 300000) {
            localStorage.removeItem('battetech_admin_session');
            localStorage.removeItem('battetech_admin_session_time');
            alert('Session expired.');
            window.location.href = 'login.html';
            return false;
        }
        
        refreshSession();
        return true;
    }
    
    function refreshSession() {
        localStorage.setItem('battetech_admin_session_time', Date.now());
        startTimer();
    }
    
    function resetInactivityTimer() {
        refreshSession();
    }
    
    let timerInterval;
    function startTimer() {
        if (timerInterval) clearInterval(timerInterval);
        timerInterval = setInterval(() => {
            const sessionTime = parseInt(localStorage.getItem('battetech_admin_session_time') || '0');
            const remaining = Math.max(0, 300000 - (Date.now() - sessionTime));
            const minutes = Math.floor(remaining / 60000);
            const secs = Math.floor((remaining % 60000) / 1000);
            const timerDisplay = document.getElementById('sessionTimer');
            if (timerDisplay) {
                timerDisplay.textContent = `Session: ${minutes}:${secs.toString().padStart(2,'0')}`;
                if (remaining <= 60000) {
                    timerDisplay.style.background = '#dc2626';
                    timerDisplay.style.color = 'white';
                }
            }
            if (remaining <= 0) {
                clearInterval(timerInterval);
                localStorage.removeItem('battetech_admin_session');
                localStorage.removeItem('battetech_admin_session_time');
                alert('Session expired.');
                window.location.href = 'login.html';
            }
        }, 1000);
    }
    
    // ============ PROPERTY IMAGE UPLOAD ============
    
    function uploadPropertyImage() {
        const input = document.createElement('input');
        input.type = 'file';
        input.accept = 'image/*';
        input.onchange = function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    document.getElementById('propImage').value = event.target.result;
                    document.getElementById('propertyImagePreview').innerHTML = 
                        `<img src="${event.target.result}" class="image-preview">`;
                };
                reader.readAsDataURL(file);
            }
        };
        input.click();
    }
    
    // ============ RENDER PROPERTIES GRID ============
    
    function renderPropertiesGrid() {
        const container = document.getElementById('propertiesGrid');
        if (!container) return;
        
        if (Object.keys(propertiesDB).length === 0) {
            container.innerHTML = '<div class="empty-state">🏢 No properties yet. Tap "Add New Property" to start.</div>';
            return;
        }
        
        let html = '';
        for (let propId in propertiesDB) {
            const prop = propertiesDB[propId];
            const vacant = getVacantCount(prop);
            const occupied = getOccupiedCount(prop);
            const totalRooms = prop.units.length;
            const statusClass = prop.status === 'pending' ? 'pending' : '';
            const statusBadge = prop.status === 'pending' ? 
                '<span class="status-badge status-pending">⏳ Pending</span>' : 
                '<span class="status-badge status-active">✅ Active</span>';
            
            html += `
                    <div class="property-card ${statusClass}" onclick="goToProperty('${propId}')" style="position:relative;">
                        <button class="delete-property-btn" onclick="event.stopPropagation(); requestPropertyDelete('${propId}')" style="position: absolute; top: 10px; right: 10px; background: #dc2626; color: white; border: none; border-radius: 50%; width: 28px; height: 28px; font-size: 0.7rem; cursor: pointer; z-index: 10;">✕</button>
                        <div class="property-header">
                            <div class="property-name">🏢 ${escapeHtml(prop.name)}</div>
                            ${statusBadge}
                        </div>
                        <div class="property-location">📍 ${escapeHtml(prop.location)}</div>
                        ${prop.propertyImage ? `<img src="${prop.propertyImage}" class="property-image-preview" onerror="this.style.display='none'">` : ''}
                        <div class="property-stats">
                            <span>📊 ${occupied} occupied</span>
                            <span>🏠 ${vacant} vacant</span>
                            <span>💰 ${totalRooms} rooms</span>
                            <span>💸 Fee: ${prop.managementFee}%</span>
                        </div>
                        <div class="owner-info">
                            👤 Owner: ${escapeHtml(prop.ownerName || 'Not set')} | 📞 ${prop.ownerPhone || '-'}
                        </div>
                    </div>
                `;
        }
        container.innerHTML = html;
    }
    
    function escapeHtml(text) {
        if (!text) return '';
        return text.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    // ============ DELETE ALL OTHER PROPERTIES ============
    
    function deleteAllOtherProperties() {
        const propertyIds = Object.keys(propertiesDB);
        if (propertyIds.length === 0) {
            alert('No properties to delete.');
            return;
        }
        
        let message = "⚠️ DELETE ALL PROPERTIES EXCEPT ONE?\n\n";
        message += "Current properties:\n";
        propertyIds.forEach((id, idx) => {
            message += `${idx + 1}. ${propertiesDB[id].name}\n`;
        });
        message += "\nType the NUMBER of the property you want to KEEP:";
        
        const keepNumber = prompt(message);
        if (keepNumber && !isNaN(keepNumber)) {
            const keepIndex = parseInt(keepNumber) - 1;
            if (keepIndex >= 0 && keepIndex < propertyIds.length) {
                const keepPropertyId = propertyIds[keepIndex];
                const keepPropertyName = propertiesDB[keepPropertyId].name;
                if (confirm(`Delete ALL other properties and keep "${keepPropertyName}" only?`)) {
                    deleteAllPropertiesExcept(keepPropertyId);
                    renderPropertiesGrid();
                    alert(`✅ Only "${keepPropertyName}" remains.`);
                }
            } else {
                alert('Invalid number.');
            }
        }
    }
    
    // ============ NAVIGATION ============
    
    function goToProperty(propertyId) {
        localStorage.setItem('battetech_current_property', propertyId);
        window.location.href = 'admin-property-detail.html';
    }
    
    // ============ MODAL FUNCTIONS ============
    
    function openAddPropertyModal() {
        document.getElementById('addPropertyModal').style.display = 'flex';
    }
    
    function closeAddPropertyModal() {
        document.getElementById('addPropertyModal').style.display = 'none';
        clearAddPropertyForm();
    }

    // ============ DELETE WITH VERIFICATION ============
    let pendingDeletePropertyId = null;
    let pendingDeleteCode = null;
    let pendingDeletePropertyName = null;

    function generateVerificationCode() {
        return Math.floor(100000 + Math.random() * 900000).toString();
    }

    function sendCodeToAdminWhatsApp(propertyName, code) {
        const YOUR_WHATSAPP = "256756182282"; // Admin WhatsApp number
        const message = `🔐 BATTETECH PROPERTY DELETION VERIFICATION\n\nProperty: ${propertyName}\nVerification Code: ${code}\n\n⚠️ Someone is trying to delete this property. Enter this code in the app to confirm deletion.\n\nIf you did not request this, IGNORE this message.`;
        const encodedMsg = encodeURIComponent(message);
        const whatsappUrl = `https://wa.me/${YOUR_WHATSAPP}?text=${encodedMsg}`;
        window.open(whatsappUrl, '_blank');
    }

    function requestPropertyDelete(propertyId) {
        const prop = propertiesDB[propertyId];
        if (!prop) return;
        const propertyName = prop.name;
        pendingDeletePropertyId = propertyId;
        pendingDeletePropertyName = propertyName;
        pendingDeleteCode = generateVerificationCode();
        sendCodeToAdminWhatsApp(propertyName, pendingDeleteCode);
        const modal = document.getElementById('deleteConfirmModal');
        if (modal) {
            document.getElementById('deletePropertyName').innerHTML = `Property: <strong>${escapeHtml(propertyName)}</strong><br><small>Code sent to admin's WhatsApp. Ask admin for the code.</small>`;
            document.getElementById('verificationCode').value = '';
            modal.style.display = 'flex';
        } else {
            alert('Delete modal not found.');
        }
    }

    async function verifyAndDelete() {
        const enteredCode = document.getElementById('verificationCode').value.trim();
        if (!enteredCode) { alert('Please enter the verification code'); return; }
        if (enteredCode !== pendingDeleteCode) { alert('❌ Invalid verification code. Please check with the admin.'); return; }
        if (pendingDeletePropertyId) {
            const propName = propertiesDB[pendingDeletePropertyId]?.name;
            await deleteProperty(pendingDeletePropertyId);
            renderPropertiesGrid();
            alert(`✅ Property "${propName}" has been permanently deleted.`);
            const confirmMsg = `✅ Property "${propName}" was successfully deleted by authorized user.`;
            const encodedConfirm = encodeURIComponent(confirmMsg);
                window.open(`https://wa.me/256756182282?text=${encodedConfirm}`, '_blank');
        }
        closeDeleteModal();
    }

    function closeDeleteModal() {
        const modal = document.getElementById('deleteConfirmModal');
        if (modal) modal.style.display = 'none';
        pendingDeletePropertyId = null;
        pendingDeleteCode = null;
        pendingDeletePropertyName = null;
        const input = document.getElementById('verificationCode');
        if (input) input.value = '';
    }
    
    function clearAddPropertyForm() {
        document.getElementById('propName').value = '';
        document.getElementById('propLocation').value = '';
        document.getElementById('propOwnerPassword').value = '';
        document.getElementById('propOwnerName').value = '';
        document.getElementById('propOwnerPhone').value = '';
        document.getElementById('propImage').value = '';
        document.getElementById('propManagementFee').value = '5';
        document.getElementById('propPenaltyFee').value = '0';
        document.getElementById('propElectricity').value = '';
        document.getElementById('propWater').value = '';
        document.getElementById('propGarbage').value = '';
        document.getElementById('propertyImagePreview').innerHTML = '';
    }
    
    async function addNewPropertyFromModal() {
        const managementFee = parseFloat(document.getElementById('propManagementFee').value);
        if (isNaN(managementFee) || managementFee < 0) {
            alert('Please enter a valid Management Fee');
            return;
        }
        
        const data = {
            name: document.getElementById('propName').value,
            location: document.getElementById('propLocation').value,
            ownerPassword: document.getElementById('propOwnerPassword').value,
            ownerName: document.getElementById('propOwnerName').value,
            ownerPhone: document.getElementById('propOwnerPhone').value,
            propertyImage: document.getElementById('propImage').value,
            status: document.getElementById('propStatus').value,
            managementFee: managementFee,
            penaltyFee: parseFloat(document.getElementById('propPenaltyFee').value) || 0,
            electricityBill: parseInt(document.getElementById('propElectricity').value) || 0,
            waterBill: parseInt(document.getElementById('propWater').value) || 0,
            garbageBill: parseInt(document.getElementById('propGarbage').value) || 0
        };
        
        if (!data.name || !data.location || !data.ownerPassword) {
            alert('Please fill Name, Location, and Owner Password');
            return;
        }
        
        await addProperty(data);
        alert(`✅ Property "${data.name}" added!\nOwner Password: ${data.ownerPassword}\nFee: ${data.managementFee}%`);
        
        closeAddPropertyModal();
        renderPropertiesGrid();
        refreshSession();
    }
    
    // ============ LOGOUT ============
    
    function adminLogout() {
        if (confirm('Logout from Admin Dashboard?')) {
            localStorage.removeItem('battetech_admin_session');
            localStorage.removeItem('battetech_admin_session_time');
            window.location.href = 'login.html';
        }
    }
    
    // ============ INITIALIZATION ============
    
    window.onload = async function() {
        if (!checkAdminSession()) return;
        
        await window.supabaseDataLoaded;
        const events = ['click', 'keypress', 'scroll', 'mousemove', 'touchstart'];
        events.forEach(event => document.addEventListener(event, resetInactivityTimer));
        
        startTimer();
        renderPropertiesGrid();
    };
</script>
