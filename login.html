<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Login - BATTETECH</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #0a2b4e 0%, #1a4a7a 100%);
            display: flex;
            flex-direction: column;
        }

        /* Header */
        header {
            background: rgba(10, 43, 78, 0.95);
            backdrop-filter: blur(10px);
            padding: 1rem;
            text-align: center;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .logo-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .logo-icon {
            font-size: 2rem;
            background: white;
            color: #0a2b4e;
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 12px;
        }

        .logo-text h1 {
            font-size: 1.5rem;
            letter-spacing: 2px;
            color: white;
        }

        .logo-text span {
            font-size: 0.7rem;
            letter-spacing: 3px;
            color: #bbd4ff;
            display: block;
        }

        /* Login Card */
        .login-container {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        .login-card {
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(10px);
            max-width: 420px;
            width: 100%;
            padding: 2rem;
            border-radius: 32px;
            text-align: center;
            box-shadow: 0 25px 50px rgba(0,0,0,0.2);
            border: 1px solid rgba(255,255,255,0.3);
        }

        .login-card h2 {
            color: #0a2b4e;
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
        }

        .login-card .sub {
            color: #666;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
        }

        .login-card input {
            width: 100%;
            padding: 14px;
            margin: 10px 0;
            border: 1px solid #ddd;
            border-radius: 50px;
            font-size: 1rem;
            background: white;
            transition: 0.2s;
        }

        .login-card input:focus {
            outline: none;
            border-color: #0a2b4e;
            box-shadow: 0 0 0 3px rgba(10,43,78,0.1);
        }

        .login-card button {
            width: 100%;
            background: #0a2b4e;
            color: white;
            padding: 14px;
            border: none;
            border-radius: 50px;
            font-weight: bold;
            font-size: 1rem;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.2s;
        }

        .login-card button:hover {
            background: #1a4a7a;
        }

        .stay-logged {
            text-align: left;
            margin: 15px 0;
            font-size: 0.85rem;
        }

        .stay-logged label {
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            color: #555;
        }

        .error-msg {
            color: #dc2626;
            margin-top: 10px;
            font-size: 0.8rem;
        }

        .demo-note {
            margin-top: 1.5rem;
            padding-top: 1rem;
            border-top: 1px solid #eee;
            font-size: 0.7rem;
            color: #888;
        }

        /* Navigation Buttons */
        .nav-buttons {
            position: fixed;
            bottom: 20px;
            left: 20px;
            right: 20px;
            display: flex;
            justify-content: space-between;
            z-index: 10;
            flex-wrap: wrap;
            gap: 10px;
        }

        .back-home {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 40px;
            text-decoration: none;
            color: white;
            font-size: 0.8rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
            transition: 0.2s;
        }

        .back-home:hover {
            background: #0a2b4e;
        }

        .contact-bar {
            background: rgba(0,0,0,0.6);
            backdrop-filter: blur(5px);
            padding: 8px 16px;
            border-radius: 40px;
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }

        .contact-bar a, .contact-bar .email-item {
            color: white;
            text-decoration: none;
            font-size: 0.8rem;
            font-weight: bold;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 4px 10px;
            border-radius: 40px;
            transition: 0.2s;
        }

        .contact-bar .whatsapp {
            background: #25D366;
        }

        .contact-bar .call {
            background: #0a2b4e;
        }

        .contact-bar .email-item {
            background: #dc2626;
            cursor: pointer;
        }

        @media (max-width: 600px) {
            .login-card { padding: 1.5rem; margin: 0 1rem; }
            .nav-buttons { bottom: 10px; left: 10px; right: 10px; }
            .back-home, .contact-bar { padding: 6px 12px; }
            .contact-bar a, .contact-bar .email-item { font-size: 0.7rem; padding: 3px 8px; }
        }
    </style>
</head>
<body>

<header>
    <div class="logo-container">
        <div class="logo-icon">🏢</div>
        <div class="logo-text">
            <h1>BATTETECH</h1>
            <span>PROPERTY CONSULTANTS</span>
        </div>
    </div>
</header>

<div class="login-container">
    <div class="login-card">
        <h2>🔐 Welcome Back</h2>
        <div class="sub">Enter your password to continue</div>
        
        <input type="password" id="loginPassword" placeholder="Enter your password" autocomplete="off">
        
        <div class="stay-logged">
            <label>
                <input type="checkbox" id="stayLoggedIn"> Remember me on this device
            </label>
        </div>
        
        <button onclick="doLogin()">Login</button>
        <div id="loginError" class="error-msg"></div>
        
        <div class="demo-note">
            <strong>🔑 How to login:</strong><br>
            • Property owners: Use the password given by BattleTech<br>
            • Admin: Use your secret admin password
        </div>
    </div>
</div>

<div class="nav-buttons">
    <a href="index.html" class="back-home">← Back to Home</a>
    <div class="contact-bar">
        <a href="tel:0794115704" class="call">📞 MTN</a>
        <a href="tel:0756182284" class="call">📞 AIRTEL</a>
        <a href="https://wa.me/256794115704" target="_blank" class="whatsapp">💬 WhatsApp</a>
        <div class="email-item" onclick="copyEmail()">📧 battetech330@gmail.com</div>
    </div>
</div>

<script>
    // ============================================
    // YOUR ADMIN PASSWORD - CHANGE THIS TO YOUR SECRET PASSWORD
    const ADMIN_PASSWORD = "wendy200?";
    // ============================================
    
    function copyEmail() {
        const email = "battetech330@gmail.com";
        navigator.clipboard.writeText(email).then(function() {
            alert("📧 Email copied: " + email);
        }).catch(function() {
            alert("⚠️ Could not copy email. Please select manually.");
        });
    }
    
    async function doLogin() {
        if (window.supabaseDataLoaded) await window.supabaseDataLoaded;
        const password = document.getElementById('loginPassword').value.trim();
        const stayLogged = document.getElementById('stayLoggedIn').checked;
        const errorDiv = document.getElementById('loginError');
        
        if (!password) {
            errorDiv.textContent = '❌ Please enter your password';
            return;
        }
        
        // FIRST CHECK: Is this the ADMIN password?
        if (password === ADMIN_PASSWORD) {
            localStorage.setItem('battetech_admin_session', 'true');
            localStorage.setItem('battetech_admin_session_time', Date.now());
            
            // Auto-logout after 5 minutes of inactivity (handled in admin pages)
            window.location.href = 'admin-dashboard.html';
            return;
        }
        
        // SECOND CHECK: Is this an OWNER password?
        const owner = getOwnerByPassword(password);
        if (owner && propertiesDB[owner.propertyId]) {
            const ownerData = {
                id: owner.id,
                name: owner.name,
                phone: owner.phone,
                propertyId: owner.propertyId
            };
            localStorage.setItem('battetech_logged_owner', JSON.stringify(ownerData));
            setAutoLogin(ownerData, stayLogged);
            window.location.href = 'owner-dashboard.html';
            return;
        }
        
        // No match
        errorDiv.textContent = '❌ Invalid password. Please check and try again.';
    }
    
    // Check for existing session (auto-login)
    window.onload = async function() {
        if (window.supabaseDataLoaded) await window.supabaseDataLoaded;
        // Check admin session
        const adminSession = localStorage.getItem('battetech_admin_session');
        if (adminSession === 'true') {
            const sessionTime = parseInt(localStorage.getItem('battetech_admin_session_time') || '0');
            if (Date.now() - sessionTime < 300000) { // 5 minutes
                window.location.href = 'admin-dashboard.html';
                return;
            } else {
                localStorage.removeItem('battetech_admin_session');
                localStorage.removeItem('battetech_admin_session_time');
            }
        }
        
        // Check owner auto-login
        const autoOwner = checkAutoLogin();
        if (autoOwner) {
            localStorage.setItem('battetech_logged_owner', JSON.stringify(autoOwner));
            window.location.href = 'owner-dashboard.html';
        }
    };
</script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="supabase-data.js"></script>
</body>
</html>
